title: Driver Load - iOCdrv.sys
id: b283745c-38b2-53e6-b794-919077bcefd8
status: experimental
description: |
    Detects loading of driver iOCdrv.sys via name.
    iOCdrv.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/9bf541fb-a68e-41a5-aab2-b939acc22bb1/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\iocdrv.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
