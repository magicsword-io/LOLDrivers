title: Driver Load - IoManager.sys
id: e2898904-301d-5548-a059-272c86f67fc9
status: experimental
description: |
    Detects loading of driver IoManager.sys via name.
    IoManager.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/2ad22816-46de-45b5-999b-864944635e0a/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\iomanager.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
