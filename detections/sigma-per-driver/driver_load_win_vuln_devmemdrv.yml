title: Driver Load - devMemDrv.sys
id: 6fbe1f05-2819-5b7b-b8b1-c8eadd760ad2
status: experimental
description: |
    Detects loading of driver devMemDrv.sys via hash.
    devMemDrv.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/f375e53d-db7c-4149-beff-c8b9329f6f9b/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=63cddb7e887833ecb0aa6c22fe052ed5'
            - 'SHA1=96476499a9ffb823af36e47b8f4bdfff78e3f658'
            - 'SHA256=b93020428f6d9ca700ab70a14911c7efcbcb1f9b659054add0dd3e7657511eb3'
            - 'IMPHASH=fd57dbd03df587dcd597b4867774cd83'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
