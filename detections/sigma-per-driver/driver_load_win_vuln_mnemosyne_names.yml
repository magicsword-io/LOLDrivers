title: Driver Load - Mnemosyne.sys
id: 33edd480-d07a-5bfd-bae9-739df3205de5
status: experimental
description: |
    Detects loading of driver Mnemosyne.sys via name.
    Mnemosyne.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/24cc4f8d-a88d-4b2d-a912-bc773d12a524/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\mnemosyne.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
