title: Driver Load - amsdk.sys
id: 319d4c2c-660a-54c7-9136-a2295de1cfb8
status: experimental
description: |
    Detects loading of driver amsdk.sys via name.
    Vulnerable driver found in https://github.com/hfiref0x/KDU.
references:
    - https://www.loldrivers.io/drivers/a285591e-ad3c-46a3-a648-c58589ff5efc/
    - https://github.com/magicsword-io/LOLDrivers/issues/55#issuecomment-1537161951
author: Michael Haag
date: 2023/05/22
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\amsdk.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
