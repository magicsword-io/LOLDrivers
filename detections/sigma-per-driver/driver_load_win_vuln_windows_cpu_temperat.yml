title: Driver Load - Windows_CPU_Temperature_Component.sys
id: 4baa95b4-f9e6-5886-b45a-5bedaee6ee30
status: experimental
description: |
    Detects loading of driver Windows_CPU_Temperature_Component.sys via hash.
    Windows_CPU_Temperature_Component.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/52955eb1-8cf4-41f3-b998-5e2e6d3aa258/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=3215e7615124e528f039bc02872789e9'
            - 'SHA1=0a642db605ce0d393dadc945afb11609e407f8d2'
            - 'SHA256=4cea52c32579869d0209f18ced0b9cc9ad8f86cac29e0fb63b3d60eb64801bda'
            - 'IMPHASH=8434fd924f47e8af731cc83bc34000ea'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
