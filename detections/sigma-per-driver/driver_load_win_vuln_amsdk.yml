title: Driver Load - amsdk.sys
id: b5661944-d8fc-554b-9fbf-44f1d62ee77d
status: experimental
description: |
    Detects loading of driver amsdk.sys via hash.
    Vulnerable driver found in https://github.com/hfiref0x/KDU.
references:
    - https://www.loldrivers.io/drivers/a285591e-ad3c-46a3-a648-c58589ff5efc/
    - https://github.com/magicsword-io/LOLDrivers/issues/55#issuecomment-1537161951
author: Michael Haag
date: 2023/05/22
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=eb525d99a31eb4fff09814e83593a494'
            - 'SHA1=290d6376658cf0f8182de0fae40b503098fa09fd'
            - 'SHA256=6f55c148bb27c14408cf0f16f344abcd63539174ac855e510a42d78cfaec451c'
            - 'IMPHASH=ad0cdf3bab32983050527655bce40f96'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
