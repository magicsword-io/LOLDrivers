title: Driver Load - PDFWKRNL.sys
id: 92b44d9a-e833-5c55-a5f7-e53f3862ff0d
status: experimental
description: |
    Detects loading of driver PDFWKRNL.sys via name.
    AMD USB-C Power Delivery Firmware Update Kernel Library driver with arbitrary physical memory read/write capabilities. Identified in ESET EDR killers research (March 2026) as actively abused by threat actors to disable EDR products.
references:
    - https://www.loldrivers.io/drivers/ed27c0b8-6177-4132-a7af-5c15bcb386f3/
    - https://www.welivesecurity.com/en/eset-research/edr-killers-explained/
author: Michael Haag
date: 2026/03/20
modified: 2026/04/10
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\pdfwkrnl.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
