title: Driver Load - VBoxUSB.Sys
id: bfa2b00f-c983-5d6d-b4d6-f6359bda74c5
status: experimental
description: |
    Detects loading of driver VBoxUSB.Sys via name.
    Confirmed vulnerable driver from Microsoft Block List
references:
    - https://www.loldrivers.io/drivers/70fa8606-c147-4c40-8b7a-980290075327/
    - https://gist.github.com/mgraeber-rc/1bde6a2a83237f17b463d051d32e802c
author: Michael Haag
date: 2023/07/22
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\vboxusb.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
