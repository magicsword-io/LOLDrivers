title: Driver Load - GameTerSafe.sys
id: 42d4f24d-ab31-577a-a238-548e550df2d8
status: experimental
description: |
    Detects loading of driver GameTerSafe.sys via name.
references:
    - https://www.loldrivers.io/drivers/067589f2-4f29-4dc4-bd50-a2e2ee57b25f/
    - https://learn.microsoft.com/en-us/windows/security/threat-protection/windows-defender-application-control/microsoft-recommended-driver-block-rules
author: Michael Haag
date: 2023/01/09
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\gametersafe.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
