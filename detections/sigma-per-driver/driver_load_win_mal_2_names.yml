title: Driver Load - 2.sys
id: c8ef5364-53e4-563f-b962-5628f1646999
status: experimental
description: |
    Detects loading of driver 2.sys via name.
    Driver categorized as POORTRY by Mandiant.
references:
    - https://www.loldrivers.io/drivers/0c0198a3-5c63-4a9b-abe9-88a810602329/
    - https://www.mandiant.com/resources/blog/hunting-attestation-signed-malware
author: Michael Haag
date: 2023/03/04
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.malicious
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\2.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: medium
