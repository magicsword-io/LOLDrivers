title: Driver Load - K7RKScan.sys
id: 41c2e19e-9f49-53ee-9f33-da658ebf228c
status: experimental
description: |
    Detects loading of driver K7RKScan.sys via name.
    Driver can be used to load unsigned drivers
references:
    - https://www.loldrivers.io/drivers/9f88300d-e607-4e50-8626-fd799439e049/
    - https://github.com/BlackSnufkin/BYOVD
author: Michael Haag
date: 2025/09/18
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\k7rkscan.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
