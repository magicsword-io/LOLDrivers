title: Driver Load - DirectIo.sys
id: 2ea0c25e-e1ea-5c99-844f-45fa5aa17b20
status: experimental
description: |
    Detects loading of driver DirectIo.sys via name.
references:
    - https://www.loldrivers.io/drivers/ce2d41fd-908f-414c-b6b5-338298f425b8/
    - https://learn.microsoft.com/en-us/windows/security/threat-protection/windows-defender-application-control/microsoft-recommended-driver-block-rules
author: Michael Haag
date: 2023/01/09
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\directio.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
