title: Driver Load - 1109.sys
id: 6038f54e-dbae-5413-8665-99de436f8fb4
status: experimental
description: |
    Detects loading of driver 1109.sys via name.
    1109.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/1adc79ba-d923-4e25-9175-77fa18e10cad/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\1109.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
