title: Driver Load - windbg.sys
id: e470a7f4-143c-5bf0-8e5a-b8cd469a7802
status: experimental
description: |
    Detects loading of driver windbg.sys via name.
    Kernel driver seen in a recent CopperStealer campaign.
references:
    - https://www.loldrivers.io/drivers/9c3c6e89-3916-498f-81e5-da057ab3ed42/
    - https://www.proofpoint.com/us/blog/threat-insight/now-you-see-it-now-you-dont-copperstealer-performs-widespread-theft
    - https://twitter.com/jaydinbas/status/1642898531445886978?s=20
    - https://twitter.com/jaydinbas/status/1646475092006785027?s=20
author: Michael Haag
date: 2023/04/22
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.malicious
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\windbg.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: medium
