title: Driver Load - ksapi.sys
id: aae869a9-a272-504f-87e2-8008d0fab812
status: experimental
description: |
    Detects loading of driver ksapi.sys via hash.
    Driver can be used to load unsigned drivers
references:
    - https://www.loldrivers.io/drivers/fb36ebc6-fdc5-42eb-929b-a07e00c5b9db/
    - https://github.com/BlackSnufkin/BYOVD
author: Michael Haag
date: 2025/09/18
modified: 2026/04/13
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=a7681a49d1ac6efb31409f17a7011a8b'
            - 'SHA1=5eea8ae51f488912f795b1408459657861faaf31'
            - 'SHA256=1cd219f58b249a2e4f86553bdd649c73785093e22c87170798dae90f193240af'
            - 'IMPHASH=6b84b4c98d44b362d90f36c816b7f49b'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
