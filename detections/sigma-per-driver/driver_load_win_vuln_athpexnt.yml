title: Driver Load - athpexnt.sys
id: aaa87657-8726-5af8-8a25-d6f68e6dc051
status: experimental
description: |
    Detects loading of driver athpexnt.sys via hash.
    AhnLab kernel driver exposing arbitrary physical memory read/write via IOCTL 0x81000000. Device accessible at \\.\ATHpEx. Signed by AhnLab Inc. with VeriSign certificate (first seen 2014). Zero detections (0/73) on VirusTotal but exploitable for privilege escalation by mapping attacker-controlled physical memory into kernel address space.
references:
    - https://www.loldrivers.io/drivers/f4e00816-97a8-4c2d-b990-9812f16fe3d3/
    - https://github.com/magicsword-io/LOLDrivers/issues/255
author: Michael Haag
date: 2026/03/20
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=bf77a19e1396d6d36e32ff8d23eb5d3f'
            - 'SHA1=e630a14b4c74264cbe702999f78750ec49359ca4'
            - 'SHA256=fa0902daefbd9e716faaac8e854144ea0573e2a41192796f3b3138fe7a1d19f1'
            - 'IMPHASH=3bac3002e583d000a28f76a62f67bfed'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
