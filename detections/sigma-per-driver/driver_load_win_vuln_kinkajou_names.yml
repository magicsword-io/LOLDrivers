title: Driver Load - Kinkajou.sys
id: 4b796dbc-d53c-5a18-95a5-6d82d6737136
status: experimental
description: |
    Detects loading of driver Kinkajou.sys via name.
    Kinkajou.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/56610446-9914-41f6-a028-33640a683c9d/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\kinkajou.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
