title: Driver Load - DNDrv.sys
id: 935eb11d-23fd-54f9-9ef0-57dbd49b41ee
status: experimental
description: |
    Detects loading of driver DNDrv.sys via name.
    DNDrv.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/4e7563f0-0d77-43e9-b765-a509ba121818/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\dndrv.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
