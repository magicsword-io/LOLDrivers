title: Driver Load - pcdsrvc_x64.sys
id: 7f520c83-1ec3-54f6-9935-53f9146784ca
status: experimental
description: |
    Detects loading of driver pcdsrvc_x64.sys via name.
    PC-Doctor pcdsrvc_x64.sys is listed as a KDU provider for Dell PC Doctor / SupportAssist driver abuse. The driver family is associated with CVE-2019-12280 and exposes kernel access primitives used by KDU as a provider for kernel memory operations.
references:
    - https://www.loldrivers.io/drivers/d4eb6ed4-c23f-45a9-9891-5aa8f218b863/
    - https://github.com/hfiref0x/KDU/blob/master/Help/providers.md
    - https://github.com/hsheric0210/SharpKernel/blob/main/provider-list.md
author: Michael Haag
date: 2026/06/16
modified: 2026/06/17
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\pcdsrvc_x64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
