title: Driver Load - mhyprotrpg.Sys
id: 31cd8d0a-7e87-5342-ab92-d1486358f276
status: experimental
description: |
    Detects loading of driver mhyprotrpg.Sys via name.
    Confirmed vulnerable driver from Microsoft Block List
references:
    - https://www.loldrivers.io/drivers/ebdde780-e142-44e7-a998-504c516f4695/
    - https://gist.github.com/mgraeber-rc/1bde6a2a83237f17b463d051d32e802c
author: Michael Haag
date: 2023/07/22
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\mhyprotrpg.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
