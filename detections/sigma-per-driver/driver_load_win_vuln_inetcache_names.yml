title: Driver Load - inetcache.sys
id: c4e62061-60fd-58d4-83b6-ee9235bca9ce
status: experimental
description: |
    Detects loading of driver inetcache.sys via name.
    inetcache.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/45b0de20-b3cc-4604-a428-175ea092cd39/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\inetcache.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
