title: Driver Load - FoxKeDriver64.sys
id: e7ef1f74-aedb-5798-9dbe-edcd4f4c31f3
status: experimental
description: |
    Detects loading of driver FoxKeDriver64.sys via name.
    FoxKeDriver64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/7f52f435-d217-4c13-98a4-4fdc6c8516c8/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\foxkedriver64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
