title: Driver Load - chinese_cheat_driver.sys
id: 407640c2-d47a-580c-bc7d-03f66a9a1292
status: experimental
description: |
    Detects loading of driver chinese_cheat_driver.sys via name.
    chinese_cheat_driver.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/98b064c4-c9ff-4cac-a6b6-a24964b70923/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\chinese_cheat_driver.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
