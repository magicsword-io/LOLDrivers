title: Driver Load - NICM.sys
id: 4aa19fdf-cf6f-52e1-8f67-65ee7c6a8cfe
status: experimental
description: |
    Detects loading of driver NICM.sys via name.
    Confirmed vulnerable driver from Microsoft Block List
references:
    - https://www.loldrivers.io/drivers/0f8e317e-ad2b-4b02-9f96-603bb8d28604/
    - https://gist.github.com/mgraeber-rc/1bde6a2a83237f17b463d051d32e802c
author: Michael Haag
date: 2023/07/22
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\nicm.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
