title: Driver Load - SONiXDDRx64.sys
id: 239818c9-7f2c-583d-96d6-d6c3b7f6b81d
status: experimental
description: |
    Detects loading of driver SONiXDDRx64.sys via name.
    SONiXDDRx64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/9720d49d-c20f-479e-9284-2b3ad120fdf8/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\sonixddrx64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
