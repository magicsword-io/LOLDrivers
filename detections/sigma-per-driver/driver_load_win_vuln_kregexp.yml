title: Driver Load - KRegExp.sys
id: 920f22e9-c1b3-5057-8128-fe6cbffa667d
status: experimental
description: |
    Detects loading of driver KRegExp.sys via hash.
    KRegExp.sys is Pavel Yosifovich's Kernel Registry Explorer driver and is listed as a KDU-compatible provider. KDU uses provider drivers to perform privileged kernel operations including kernel memory access and process-object manipulation.
references:
    - https://www.loldrivers.io/drivers/eada0015-c868-463c-91a6-d159ee1110d7/
    - https://github.com/hfiref0x/KDU/blob/master/Help/providers.md
    - https://github.com/hsheric0210/SharpKernel/blob/main/provider-list.md
author: Michael Haag
date: 2026/06/16
modified: 2026/06/26
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=a5406327e13ad633b00bc62353e7dedc'
            - 'SHA1=f3383fe0ff00bdea1aa9e68bcaad8b83885e306d'
            - 'SHA256=5c237dcec01f5e31a78cf8c883e41d85c74675b1426379302b46b771d091dce6'
            - 'IMPHASH=0b9365a82a9033a116c4ea996fdc6315'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
