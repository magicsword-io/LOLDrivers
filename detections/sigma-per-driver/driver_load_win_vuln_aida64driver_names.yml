title: Driver Load - AIDA64Driver.sys
id: ce57f360-a595-5671-a48a-b1d5708050fd
status: experimental
description: |
    Detects loading of driver AIDA64Driver.sys via name.
    AIDA64Driver.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/deffeb8d-c7d9-46b9-a921-7d8d096460ef/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\aida64driver.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
