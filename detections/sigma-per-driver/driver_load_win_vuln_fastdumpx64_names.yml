title: Driver Load - fastdumpx64.sys
id: f7541235-d5f8-538b-a681-69f84695cd04
status: experimental
description: |
    Detects loading of driver fastdumpx64.sys via name.
    fastdumpx64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/619953be-2115-4da2-bb59-603fcf93a3d2/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\fastdumpx64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
