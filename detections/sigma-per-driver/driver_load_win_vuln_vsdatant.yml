title: Driver Load - vsdatant.sys
id: f657a66d-c3e4-513d-9adf-243eb86fe6d1
status: experimental
description: |
    Detects loading of driver vsdatant.sys via hash.
    Check Point ZoneAlarm driver (vsdatant.sys) abused in BYOVD attacks to gain kernel privileges and bypass protections such as Memory Integrity.
references:
    - https://www.loldrivers.io/drivers/87d5ec39-482e-4e78-a003-be4b662f85fc/
    - https://venaksecurity.com/2025/03/20/cybercriminals-exploit-checkpoints-driver-in-a-byovd-attack/
author: Kyaw Pyiyt Htet
date: 2025/03/22
modified: 2026/04/10
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=190fe0ce4d43ad8eed97aaa68827e2c6'
            - 'SHA1=f16d24ed98bcc35ecae902474abfc4820db541da'
            - 'SHA256=1c43f33573a0815c5edc5e18ba1038afdd11f55a7cd8b08ba59b8f7357117e4c'
            - 'IMPHASH=898c18bb22258c225c07e8476efdf79e'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
