title: Driver Load - bs_rcio64.sys
id: 516427d4-306b-57c7-b9db-a303da4b4a00
status: experimental
description: |
    Detects loading of driver bs_rcio64.sys via name.
    Confirmed vulnerable driver from Microsoft Block List
references:
    - https://www.loldrivers.io/drivers/cacf18a5-6d7d-4a63-92d4-bda386a3da18/
    - https://gist.github.com/mgraeber-rc/1bde6a2a83237f17b463d051d32e802c
author: Michael Haag
date: 2023/07/22
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\bs_rcio64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
