title: Driver Load - iobios64.sys
id: ad759e1d-0e29-50e9-82a4-6462eecc84c1
status: experimental
description: |
    Detects loading of driver iobios64.sys via name.
    iobios64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/00755879-eeb3-4a70-9df6-c4e8ff561cdc/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\iobios64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
