title: Driver Load - Amd_RPMC_BiosToolCommonDriver.sys
id: 66936ec2-6f62-5938-98cb-6b04eea81a5b
status: experimental
description: |
    Detects loading of driver Amd_RPMC_BiosToolCommonDriver.sys via hash.
    Amd_RPMC_BiosToolCommonDriver.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/8dbd8d1c-aa4a-418c-9bbe-0730d37d9bb5/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=eda194abb7d4d0ab3a52ac6147c56402'
            - 'SHA1=c769d4c56e4835c6ddf1d141bc245d411a20f591'
            - 'SHA256=4e913a99b38abea038202c95c6bc5d8d866a6e2869101a14a05079235346d9a1'
            - 'IMPHASH=e3c915c62d33052b715b0a50dfa2d89d'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
