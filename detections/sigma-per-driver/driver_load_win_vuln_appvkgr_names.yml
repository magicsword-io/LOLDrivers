title: Driver Load - AppVkgr.sys
id: 2bbe4a8b-e456-5bfc-94df-fabdb3ddfd6a
status: experimental
description: |
    Detects loading of driver AppVkgr.sys via name.
    AppVkgr.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/fbd12dbb-434e-4950-887a-382b681e8a5a/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\appvkgr.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
