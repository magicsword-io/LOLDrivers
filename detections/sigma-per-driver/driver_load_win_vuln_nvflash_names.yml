title: Driver Load - nvflash.sys
id: a070b642-7d40-517c-a01f-d91868372897
status: experimental
description: |
    Detects loading of driver nvflash.sys via name.
    NVIDIA Flash Driver, Version 1.8.0
references:
    - https://www.loldrivers.io/drivers/d55a5955-6220-4f38-ba7d-91339330fe98/
    - https://github.com/eclypsium/Screwed-Drivers/blob/master/DRIVERS.md
author: Michael Haag
date: 2023/01/09
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\nvflash.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
