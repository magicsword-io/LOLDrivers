title: Driver Load - NetFlt.sys
id: 379855a5-e723-593a-b0e1-7bf6f8754e83
status: experimental
description: |
    Detects loading of driver NetFlt.sys via name.
references:
    - https://www.loldrivers.io/drivers/30d6c39c-1d93-4101-8dd3-322ff0ab7fb3/
    - https://learn.microsoft.com/en-us/windows/security/threat-protection/windows-defender-application-control/microsoft-recommended-driver-block-rules
author: Michael Haag
date: 2023/01/09
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\netflt.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
