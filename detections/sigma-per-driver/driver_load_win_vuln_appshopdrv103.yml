detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=ff6d5b0c4d9b2fd12d60656fd031c184'
            - 'SHA1=6074c2360f5dc74738873a525dfbd67eb6625986'
            - 'SHA256=cea231333781085538127bdcfbf49ef1d7500c057295fba061e962376e8219e6'
            - 'IMPHASH=88e21ed9e717781eaf87209acbdbb567'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
