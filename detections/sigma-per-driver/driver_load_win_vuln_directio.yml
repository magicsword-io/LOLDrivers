title: Driver Load - DirectIo.sys
id: 096ece1f-83ef-59a1-8d6b-33ce78a7be1c
status: experimental
description: |
    Detects loading of driver DirectIo.sys via hash.
references:
    - https://www.loldrivers.io/drivers/ce2d41fd-908f-414c-b6b5-338298f425b8/
    - https://learn.microsoft.com/en-us/windows/security/threat-protection/windows-defender-application-control/microsoft-recommended-driver-block-rules
author: Michael Haag
date: 2023/01/09
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=a785b3bc4309d2eb111911c1b55e793f'
            - 'SHA1=19f3343bfad0ef3595f41d60272d21746c92ffca'
            - 'SHA256=4422851a0a102f654e95d3b79c357ae3af1b096d7d1576663c027cfbc04abaf9'
            - 'IMPHASH=68b717fa2ab9431cd176776363359d48'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
