title: Driver Load - GVCIDrv64.sys
id: 2aaa05fc-a8fc-547a-bd41-26c07738360e
status: experimental
description: |
    Detects loading of driver GVCIDrv64.sys via name.
references:
    - https://www.loldrivers.io/drivers/7c83cb1a-a5ab-4ea0-aa69-0e9a1d09a82f/
    - https://github.com/eclypsium/Screwed-Drivers/blob/master/DRIVERS.md
author: Michael Haag
date: 2023/01/09
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\gvcidrv64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
