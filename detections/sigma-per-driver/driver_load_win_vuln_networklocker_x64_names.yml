title: Driver Load - NetworkLocker_x64.sys
id: c6eee478-06dd-5e41-87e3-eedadefb1fb2
status: experimental
description: |
    Detects loading of driver NetworkLocker_x64.sys via name.
    NetworkLocker_x64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/0e114b5b-7ec1-4fa3-ac93-e505f986547f/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\networklocker_x64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
