title: Driver Load - ProcessCtr.sys
id: 8ff5fbb5-a875-5c41-8c38-18c5eb071af7
status: experimental
description: |
    Detects loading of driver ProcessCtr.sys via name.
    EsafeNet ProcessCtr / ProcessCtrl64.sys creates a device object reachable by local callers and exposes process-control IOCTL paths. Public research documents a vulnerable process-termination path that can allow privileged process termination or denial of service when user-supplied context/handle material is accepted without adequate authorization checks.
references:
    - https://www.loldrivers.io/drivers/5d658b45-81f0-442e-ac43-7c249ce1d54f/
    - https://github.com/The-Sword-of-Constantine/UsingBYOVD/blob/master/BYOVD/ProcessCtr.cpp
    - https://github.com/KOSEC-LLC/BYOVD-Research/tree/main/EsafeNet
author: Element2023H
date: 2026/06/09
modified: 2026/06/16
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\processctr.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
