title: Driver Load - PDFWKRNL.sys
id: 53a60f96-ce34-566b-b533-fd39e128e3f0
status: experimental
description: |
    Detects loading of driver PDFWKRNL.sys via hash.
    AMD USB-C Power Delivery Firmware Update Kernel Library driver with arbitrary physical memory read/write capabilities. Identified in ESET EDR killers research (March 2026) as actively abused by threat actors to disable EDR products.
references:
    - https://www.loldrivers.io/drivers/ed27c0b8-6177-4132-a7af-5c15bcb386f3/
    - https://www.welivesecurity.com/en/eset-research/edr-killers-explained/
author: Michael Haag
date: 2026/03/20
modified: 2026/04/13
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=b96d75a000367c200958089728fc5cb8'
            - 'SHA1=f329ae0fdf1e198bea6ba787e59cb73f90714002'
            - 'SHA256=6e8b49cf70bf854e8c59c7d27cefa89406caf8978461190dabb86dafcd8554e1'
            - 'IMPHASH=3f4c9025125027e307b7e52dd577303b'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
