title: Driver Load - ksapi.sys
id: 75f9bd80-f0b8-5e00-b22e-299010e66d1d
status: experimental
description: |
    Detects loading of driver ksapi.sys via name.
    Driver can be used to load unsigned drivers
references:
    - https://www.loldrivers.io/drivers/fb36ebc6-fdc5-42eb-929b-a07e00c5b9db/
    - https://github.com/BlackSnufkin/BYOVD
author: Michael Haag
date: 2025/09/18
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\ksapi.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
