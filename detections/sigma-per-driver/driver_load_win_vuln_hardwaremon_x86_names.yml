title: Driver Load - HardwareMon-x86.sys
id: 2d1a42b5-7c18-5a84-a8d6-8a46fcd6147e
status: experimental
description: |
    Detects loading of driver HardwareMon-x86.sys via name.
    HardwareMon-x86.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/24d8bef2-379c-4a27-bd2d-4f13136f3476/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\hardwaremon-x86.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
