title: Driver Load - nscm.sys
id: 79a26d31-4221-56de-bfd9-677da56c17ba
status: experimental
description: |
    Detects loading of driver nscm.sys via name.
    nscm.sys is a vulnerable driver. CVE-2013-3956.
references:
    - https://www.loldrivers.io/drivers/351ff5ca-f07b-4eb6-9300-d5d31514defb/
    - https://github.com/jbaines-r7/dellicious
    - https://www.rapid7.com/blog/post/2021/12/13/driver-based-attacks-past-and-present/
author: Michael Haag
date: 2023/01/09
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\nscm.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
