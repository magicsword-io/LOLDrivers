title: Driver Load - PoisonX.sys
id: 7c02267a-8057-51b7-a710-652d8071d859
status: experimental
description: |
    Detects loading of driver PoisonX.sys via hash.
    A Microsoft-signed vulnerable driver used in BYOVD attacks to terminate protected processes, including EDR solutions such as CrowdStrike Falcon. The driver exposes an IOCTL that allows arbitrary process termination from user mode by passing a PID.
references:
    - https://www.loldrivers.io/drivers/fc3467c3-6109-447d-b438-7a4276c3d8e5/
    - https://medium.com/@jehadbudagga/reverse-engineering-a-0day-used-against-crowdstrike-edr-a5ea1fbe3fd4
    - https://github.com/j3h4ck/PoisonKiller/
author: Bilal Retiat
