title: Driver Load - LnvMSRIO.sys
id: 985f5d18-4649-5a51-aff8-c21bf90dc1a1
status: experimental
description: |
    Detects loading of driver LnvMSRIO.sys via name.
    LnvMSRIO.sys is a Lenovo Dispatcher driver affected by CVE-2025-8061. Vulnerable Lenovo Dispatcher 3.0 and 3.1 drivers expose the WinMsrDev device interface with insufficient access control. Public research documents primitives for physical memory read (IOCTL 0x9C406104), physical memory write (IOCTL 0x9C40A108), MSR read (IOCTL 0x9C402084), and MSR write (IOCTL 0x9C402088), enabling an authenticated local user to execute code with elevated privileges when Memory Integrity is not enabled. Lenovo reports Dispatcher 3.2 and driver versions 3.1.0.41 and later as not affected.
references:
    - https://www.loldrivers.io/drivers/87680018-393b-47b6-8130-6b41bed2bc7c/
    - https://github.com/magicsword-io/LOLDrivers/issues/242
    - https://github.com/symeonp/Lenovo-CVE-2025-8061
    - https://blog.quarkslab.com/exploiting-lenovo-driver-cve-2025-8061.html
    - https://nvd.nist.gov/vuln/detail/CVE-2025-8061
    - https://support.lenovo.com/us/en/product_security/LEN-200860
    - https://github.com/segura2010/lenovo-dispatcher-poc
    - https://github.com/spawn451/CVE-2025-8061-Exploit
author: Michael Haag
date: 2026/06/16
modified: 2026/06/17
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\lnvmsrio.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
