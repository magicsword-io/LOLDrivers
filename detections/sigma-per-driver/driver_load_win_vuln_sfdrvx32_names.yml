title: Driver Load - sfdrvx32.sys
id: 6c079500-7323-56ec-bb0d-b64ffd93c367
status: experimental
description: |
    Detects loading of driver sfdrvx32.sys via name.
    Confirmed vulnerable driver from Microsoft Block List
references:
    - https://www.loldrivers.io/drivers/6c0c60f0-895d-428a-a8ae-e10390bceb12/
    - https://gist.github.com/mgraeber-rc/1bde6a2a83237f17b463d051d32e802c
author: Michael Haag
date: 2023/07/22
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\sfdrvx32.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
