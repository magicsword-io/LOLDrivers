title: Driver Load - KExplore.sys
id: 8fe88dd3-e467-5913-8b1d-9bf1dcda0d46
status: experimental
description: |
    Detects loading of driver KExplore.sys via name.
    KExplore.sys is Pavel Yosifovich's Kernel Explorer driver and is listed as a KDU-compatible provider. KDU uses supported provider drivers to access kernel memory primitives for actions such as process-object modification and driver mapping.
references:
    - https://www.loldrivers.io/drivers/1b916d35-f62b-41ef-8454-3aed20299cb0/
    - https://github.com/hfiref0x/KDU/blob/master/Help/providers.md
    - https://github.com/hsheric0210/SharpKernel/blob/main/provider-list.md
author: Michael Haag
date: 2026/06/16
modified: 2026/06/17
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\kexplore.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
