title: Driver Load - hw.sys
id: ee114444-714c-5782-b175-b0057803eb45
status: experimental
description: |
    Detects loading of driver hw.sys via hash.
    Northwave Cyber Security contributed this driver based on in-house research. The driver has a CVSSv3 score of 8.8, indicating a privilege escalation impact. This vulnerability could potentially be exploited for privilege escalation or other malicious activities.
references:
    - https://www.loldrivers.io/drivers/5076e737-6744-4266-bef7-bceda65050d6/
    - https://northwave-cybersecurity.com/vulnerability-notice-hardware-access-driver-marvintest-solutions?hsLang=en
author: Northwave Cyber Security
date: 2024/09/11
modified: 2026/05/18
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=9347fbeeaf917fc4a1d64a0b4d61187a'
            - 'SHA1=01e74172e10d8b5f589e26ee8e3e4aec485edc6f'
            - 'SHA256=0483b32f9544e9c3cc3f206e7bc983ea83f5a9ca44864f2af9b8fc10ff45949f'
            - 'IMPHASH=a70bfdb391d295cb610248955a594dbd'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
