title: Driver Load - TVicPort64.sys
id: 43425eb7-8ac2-5351-a178-c43dbbc9eb8d
status: experimental
description: |
    Detects loading of driver TVicPort64.sys via hash.
    Load TVicPort64.sys kernel driver. Once loaded, device \\.\TVicPortDevice0 is accessible from any integrity level (no DACL). Send IOCTL 0x80002008 to map arbitrary physical memory into user-mode VA space via ZwMapViewOfSection and perform token stealing for LPE to SYSTEM.
references:
    - https://www.loldrivers.io/drivers/b4f3a1c2-e8d7-4f92-a301-5c6d9e0b1a2f/
    - https://www.entechtaiwan.com/dev/port/index.shtm
author: Joao Leko Monteiro
date: 2026/02/13
modified: 2026/04/14
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=a65643ed30a30e46317c0b25818bc9b7'
            - 'SHA1=3740f2bc7e81d75604e47a3119faa887d4a92a44'
            - 'SHA256=9c9ab56c8bcf5ec958e7c2346f23a3027f69abdf8af923b591518eee64ad98ad'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
