title: Driver Load - _xyzxbqvb.rdu_GFAC_Sys_x64.sys
id: 4140eac7-6231-5aac-9150-52ee7dc1a02e
status: experimental
description: |
    Detects loading of driver _xyzxbqvb.rdu_GFAC_Sys_x64.sys via name.
    _xyzxbqvb.rdu_GFAC_Sys_x64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/63535f5c-9535-4bb0-ae8c-4366d40055f9/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\_xyzxbqvb.rdu_gfac_sys_x64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
