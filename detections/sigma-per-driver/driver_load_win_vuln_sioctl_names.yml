title: Driver Load - SIOCTL.sys
id: cb9b6699-fc0c-5176-8350-98d542fb1521
status: experimental
description: |
    Detects loading of driver SIOCTL.sys via name.
    SIOCTL.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/47e08b2f-7925-40c5-9bcf-0af348c07d33/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\sioctl.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
