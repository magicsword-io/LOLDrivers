title: Driver Load - srswdrv.sys
id: 201237db-2e8b-5f69-b1d4-5da6902539b6
status: experimental
description: |
    Detects loading of driver srswdrv.sys via hash.
    srswdrv.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/5c4142a6-b287-4817-864f-152be08f7c48/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=4aa226d5b771edc1109c469a76bd38b2'
            - 'SHA1=1b03900fe18aee01758379daef96cb5ad66d2690'
            - 'SHA256=57414e532a7a10ae7af7fa6294d1d95ad4d9d506882258c5e59d53b4e4f2c91a'
            - 'IMPHASH=582d4ea1add7abb8148deff8402d2e6b'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
