title: Driver Load - mtxmem.sys
id: a1868d7f-3d22-51ff-ab12-906c3aaf57fb
status: experimental
description: |
    Detects loading of driver mtxmem.sys via name.
    mtxmem.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/7c766ce5-fa74-4080-907d-95f2f68d49e7/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\mtxmem.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
