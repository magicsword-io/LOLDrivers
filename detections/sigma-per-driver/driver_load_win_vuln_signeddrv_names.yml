title: Driver Load - signeddrv.sys
id: b8ff41e7-f2fb-56a4-b638-670e915b0b65
status: experimental
description: |
    Detects loading of driver signeddrv.sys via name.
    signeddrv.sys is a Microsoft-signed vulnerable kernel driver that exposes an unrestricted \\.\WinNotify device. Public research documents IOCTL 0x22200C for kernel base disclosure, IOCTL 0x222040 for arbitrary kernel read, and IOCTL 0x222044 for arbitrary kernel write, enabling local privilege escalation.
references:
    - https://www.loldrivers.io/drivers/028aecb5-70d0-4423-87d7-f037a11ef1c9/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/magicsword-io/LOLDrivers/issues/367
    - https://github.com/magicsword-io/LOLDrivers/issues/370
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
    - https://github.com/Haider303/winnotify-exp
    - https://github.com/Haider303/sliff-driv-exploit
    - https://medium.com/@haider303mustafa/winnotify-signeddrv-sys-full-local-privilege-escalation-via-arbitrary-kernel-read-write-09e0c1ababf3
    - https://medium.com/@haider303mustafa/applockerflter-sliffdriver-sys-full-kernel-exploit-chain-from-driver-recon-to-system-shell-b57d87738308
author: Michael Haag
date: 2026/04/17
modified: 2026/06/17
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\signeddrv.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
