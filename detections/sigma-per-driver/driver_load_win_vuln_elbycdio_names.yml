title: Driver Load - elbycdio.sys
id: 9567ad61-f04c-5d4d-9620-e16010f30438
status: experimental
description: |
    Detects loading of driver elbycdio.sys via name.
    elbycdio.sys is a vulnerable driver. CVE-2009-0824.
references:
    - https://www.loldrivers.io/drivers/855ade1f-8a9e-4c9d-ab8e-d7e409609852/
    - https://github.com/jbaines-r7/dellicious
    - https://www.rapid7.com/blog/post/2021/12/13/driver-based-attacks-past-and-present/
    - https://media.kasperskycontenthub.com/wp-content/uploads/sites/43/2018/03/08064459/Equation_group_questions_and_answers.pdf
author: Michael Haag
date: 2023/01/09
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\elbycdio.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
