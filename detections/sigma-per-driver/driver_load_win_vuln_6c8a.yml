title: Driver Load - 6c8a.sys
id: 4372ae06-bd0f-59ab-8962-b96a75de9522
status: experimental
description: |
    Detects loading of driver 6c8a.sys via hash.
    6c8a.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/54af50e5-c964-485a-9b15-d5411971a425/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/23
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=7039952d33cbef5d5b818a42d83b3cd2'
            - 'SHA1=9f390c92c2a268e05a0eceb195f396499ff4514a'
            - 'SHA256=8fc5300027547e0eb446239c2a2b95016a9cd25816576407c64389ad12676c8a'
            - 'IMPHASH=a8633e68c2ad9f3dc83775d8d5b21c5b'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
