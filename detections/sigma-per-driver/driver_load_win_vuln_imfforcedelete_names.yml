title: Driver Load - IMFForceDelete
id: c0d22b28-b77f-58d5-b294-1f792aceba99
status: experimental
description: |
    Detects loading of driver IMFForceDelete via name.
    IObit Malware Fighter IMFForceDelete.sys is a vulnerable force-delete filter driver. ESET documents GentleKiller's Cleaner variant dropping this driver without the trailing .sys extension, and CVE-2019-6494 describes IOCTL 0x8016E000 allowing low-privileged users to delete files regardless of access controls.
references:
    - https://www.loldrivers.io/drivers/6ca608ec-df2e-4a8d-8a0b-350f9e0271ab/
    - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
    - https://www.eset.com/us/about/newsroom/research/eset-research-gentlemen-ransomware-gang-edr-killers/
    - https://github.com/magicsword-io/LOLDrivers/issues/377
    - https://nvd.nist.gov/vuln/detail/CVE-2019-6494
    - https://github.com/advisories/GHSA-rj7p-8gjh-5gqf
author: Michael Haag
date: 2026/06/22
modified: 2026/06/26
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\imfforcedelete'
    condition: selection_name
falsepositives:
    - Unknown
level: low
