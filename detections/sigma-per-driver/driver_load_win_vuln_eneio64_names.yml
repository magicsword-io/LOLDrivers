title: Driver Load - EneIo64.sys
id: 52d4ab93-208c-5251-b7ce-308236230870
status: experimental
description: |
    Detects loading of driver EneIo64.sys via name.
references:
    - https://www.loldrivers.io/drivers/9b65dba4-81a0-48cc-8ff0-a4f353881062/
    - https://gist.github.com/k4nfr3/af970e7facb09195e56f2112e1c9549c
author: Michael Haag
date: 2023/01/09
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\eneio64.sys'
    condition: selection_name
falsepositives:
