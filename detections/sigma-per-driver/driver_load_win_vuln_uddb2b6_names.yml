title: Driver Load - UDDB2B6.sys
id: d2e284e7-6986-597e-b466-1cea0f4d782a
status: experimental
description: |
    Detects loading of driver UDDB2B6.sys via name.
    UDDB2B6.sys is a TechPowerUp kernel driver (GPU-Z variant) that exposes I/O port read/write, MSR read/write, MmMapIoSpace map/unmap/read/write, and PCI configuration space read/write. TechPowerUp has a history of vulnerable kernel drivers including GPU-Z.sys (CVE-2019-7245, CVE-2025-5324) and ThrottleStop.sys (CVE-2025-7771). The driver is available in the KeServiceDescriptorTable/vulnerable-drivers repository.
references:
    - https://www.loldrivers.io/drivers/886af494-4087-48c9-b48f-53e638d6f62e/
    - https://github.com/magicsword-io/LOLDrivers/issues/323
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\uddb2b6.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
