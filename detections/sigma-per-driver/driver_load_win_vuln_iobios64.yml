title: Driver Load - iobios64.sys
id: f711bbc1-69ff-5193-940e-e7689f5495a6
status: experimental
description: |
    Detects loading of driver iobios64.sys via hash.
    iobios64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/00755879-eeb3-4a70-9df6-c4e8ff561cdc/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=d49368296a3cd000ec0cea88c4bf7edd'
            - 'SHA1=fbd6c739b86afa550187cc80aa6dc139c0790cef'
            - 'SHA256=314a51fcf6e37eb8550a826df085d5c88c43eb1438682f3a6c33632d36956136'
            - 'IMPHASH=0dcd262801389f839ce909cb173448e2'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
