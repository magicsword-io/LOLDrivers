status: experimental
description: |
    Detects loading of driver GLCKIO2.sys via name.
references:
    - https://www.loldrivers.io/drivers/868c6920-f6cb-4088-8277-095a1358abe1/
    - https://github.com/namazso/physmem_drivers
author: Michael Haag
date: 2023/01/09
modified: 2026/04/06
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
