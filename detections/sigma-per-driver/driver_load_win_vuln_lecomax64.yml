logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=8ac99a014b36c4cf1eeee98f99410cca'
            - 'SHA1=eb817e8af016f6a3ece2b7cf421ec6d96970e285'
