title: Driver Load - CSAgent.sys
id: dd66b3e3-573e-5129-bce3-9477c67775ec
status: experimental
description: |
    Detects loading of driver CSAgent.sys via hash.
    Sophos X-Ops (Aug 06, 2025)
    documents a shared EDR-killer technique where a user-mode loader deploys a
    malicious kernel driver signed with compromised/revoked certificates (e.g.,
    Changsha Hengxiang Information Technology; Fuzhou Dingxin Trade). The
    driver terminates processes/services of multiple security vendors and is
    often delivered packed with HeartCrypt during ransomware intrusions
    (RansomHub, INC, others). Sample-specific driver names (e.g., mraml.sys,
    noedt.sys) are hard-coded in the payload.
references:
    - https://www.loldrivers.io/drivers/8e673a36-4f16-4f4c-acf7-ca95bc586384/
    - https://news.sophos.com/en-us/2025/08/06/shared-secret-edr-killer-in-the-kill-chain/
author: Michael Haag
date: 2025/08/08
modified: 2026/05/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=6d6dfb7a684f7374656aea13ad764e90'
            - 'SHA1=9ff1a5038a5484b0dba0c6647a1a6c7a5ae2a4d9'
            - 'SHA256=efb642ad3fab4a2e6cb4de829b60e04dd0d9ae7c2b4cf544de28c38f978b4136'
            - 'IMPHASH=4e3c3df003b6a014459f47ae8cb021c7'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
