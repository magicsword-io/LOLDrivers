    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=f0e46578a7fed41c88ec64fdc11d2a72'
            - 'SHA1=8d733095ac1cfcd799f58be3b8a25800f31e6fe2'
            - 'SHA256=4b0e9834dd672e4ce81464d8887c71f9a0942140557cd0ad321da9a1aa849959'
            - 'IMPHASH=ca98e73abb2034feb3d76a2a0a3bea54'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
