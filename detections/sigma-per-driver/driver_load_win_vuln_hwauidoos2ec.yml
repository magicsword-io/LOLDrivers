title: Driver Load - HWAuidoOs2Ec.sys
id: a61a39ef-a08f-56eb-9a3c-417f51a094be
status: experimental
description: |
    Detects loading of driver HWAuidoOs2Ec.sys via hash.
    Huawei HWAuidoOs2Ec.sys is a vulnerable kernel driver from public vulnerable-driver research. Public DragonForce reporting also lists this driver in BYOVD tradecraft used to disable endpoint security tooling.
references:
    - https://www.loldrivers.io/drivers/2c7d54ff-7b49-4da8-ae77-00ac6fa2944f/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
    - https://www.security.com/threat-intelligence/dragonforce-msteams-backdoor
    - https://www.huntress.com/blog/w2-malvertising-to-kernel-mode-edr-kill
    - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
    - https://github.com/magicsword-io/LOLDrivers/issues/377
