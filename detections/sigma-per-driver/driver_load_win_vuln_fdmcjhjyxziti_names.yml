title: Driver Load - FDMCJHJYXZITI.sys
id: 081d07ee-af48-5c45-b87f-b3d22296d381
status: experimental
description: |
    Detects loading of driver FDMCJHJYXZITI.sys via name.
    FDMCJHJYXZITI.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/f650dfc3-d3a1-4a9a-8b71-c599d1f9579c/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\fdmcjhjyxziti.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
