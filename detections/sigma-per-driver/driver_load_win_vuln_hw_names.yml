title: Driver Load - hw.sys
id: b804221e-e4bf-5d85-ba2f-6450b9a5542d
status: experimental
description: |
    Detects loading of driver hw.sys via name.
    Northwave Cyber Security contributed this driver based on in-house research. The driver has a CVSSv3 score of 8.8, indicating a privilege escalation impact. This vulnerability could potentially be exploited for privilege escalation or other malicious activities.
references:
    - https://www.loldrivers.io/drivers/5076e737-6744-4266-bef7-bceda65050d6/
    - https://northwave-cybersecurity.com/vulnerability-notice-hardware-access-driver-marvintest-solutions?hsLang=en
author: Northwave Cyber Security
date: 2024/09/11
modified: 2026/05/18
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\hw.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
