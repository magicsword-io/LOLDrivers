title: Driver Load - NetworkLocker_x64.sys
id: 949d299b-5795-5880-8f07-b41a4ec70705
status: experimental
description: |
    Detects loading of driver NetworkLocker_x64.sys via hash.
    NetworkLocker_x64.sys is a vulnerable kernel driver from the KeServiceDescriptorTable/vulnerable-drivers repository. The driver exposes dangerous kernel primitives to usermode.
references:
    - https://www.loldrivers.io/drivers/0e114b5b-7ec1-4fa3-ac93-e505f986547f/
    - https://github.com/magicsword-io/LOLDrivers/issues/325
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/20
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_hashes:
        Hashes|contains:
            - 'MD5=a982993a68f4aa8789386cedcc1e5b03'
            - 'SHA1=354f89e4fe21c1a1e213c933793e41a7008f2bd1'
            - 'SHA256=ff0892697771f1a9968423793faa34008cfa0041fee48d5b52b25314f7a6a7b4'
            - 'IMPHASH=6e4ddf452e921db2a3cb4d3cbf2a8404'
    condition: selection_hashes
falsepositives:
    - Unknown
level: high
