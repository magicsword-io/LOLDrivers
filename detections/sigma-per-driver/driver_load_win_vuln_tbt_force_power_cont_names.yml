title: Driver Load - TBT_Force_Power_Control_Access64.sys
id: 3f37317c-2d63-5585-8bc2-5978bd606a2a
status: experimental
description: |
    Detects loading of driver TBT_Force_Power_Control_Access64.sys via name.
    TBT_Force_Power_Control_Access64.sys is a Thunderbolt force power control driver from Wistron Corporation that exposes physical memory read/write via MmMapIoSpace. Wistron is a major Taiwan-based OEM/ODM. Another Wistron driver (WiRwaDrv.sys) is already tracked in LOLDrivers. The driver is available in the KeServiceDescriptorTable/vulnerable-drivers repository.
references:
    - https://www.loldrivers.io/drivers/408964b3-1799-425b-92bf-465c72a272d1/
    - https://github.com/magicsword-io/LOLDrivers/issues/316
    - https://github.com/KeServiceDescriptorTable/vulnerable-drivers
author: Michael Haag
date: 2026/04/17
modified: 2026/04/28
tags:
    - attack.privilege_escalation
    - attack.t1543.003
    - attack.t1068
    - loldrivers.vulnerable
logsource:
    product: windows
    category: driver_load
detection:
    selection_name:
        ImageLoaded|endswith:
            - '\tbt_force_power_control_access64.sys'
    condition: selection_name
falsepositives:
    - Unknown
level: low
