Author: Michael Haag
Created: '2026-06-16'
MitreID: T1562.001
Category: vulnerable driver
Commands:
  Command: sc.exe create ZYArKit binPath=C:\windows\temp\ZYArKit.sys type=kernel &&
    sc.exe start ZYArKit
  Description: V-secure ZYArKit.sys version 2.0.13.5 is a signed kernel driver assessed
    in public KOSEC BYOVD research. KOSEC documents an IOCTL path that references
    a user-supplied process handle and reaches ZwTerminateProcess, allowing administrator-context
    termination of non-protected processes from kernel mode.
  Usecase: Terminate non-protected processes from kernel mode through a vulnerable
    IOCTL path.
  Privileges: kernel
  OperatingSystem: Windows 10, Windows 11
Resources:
- https://github.com/KOSEC-LLC/BYOVD-Research/tree/main/V-secure
