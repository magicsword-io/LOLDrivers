Commands:
  Command: >
    sc.exe create NGStarSvc type= kernel start= demand
    binPath=C:\Windows\System32\drivers\NGStar.sys &&
    sc.exe start NGStarSvc
  Description: >
    NGStar.sys is a kernel-mode USB driver for NITGEN HamsterII/III biometric fingerprint
    readers (FDU11/FDU14), shipped as part of the NITGEN Biometric Device Driver
    package v3.12. The driver calls IoCreateDevice() without IoCreateDeviceSecure()
    and sets no security descriptor on the resulting object. All IOCTL dispatch codes
    are defined with FILE_ANY_ACCESS (access bits 0x0), so the Windows I/O Manager
    performs no privilege pre-check before passing requests into Ring-0. Any local
    unprivileged process can open \\.\GSTAR-0 and send arbitrary IOCTLs into the
    kernel dispatch handler. Named codes FDU11_IOCTL_LOCK_DEVICE and
    FDU11_IOCTL_UNLOCK_DEVICE are reachable without elevation, enabling biometric
    authentication DoS. Additionally, sprintf() is imported from ntoskrnl.exe (not
    sprintf_s) and USB descriptor fields from connected hardware are passed as format
    string arguments in kernel stack buffers without bounds checking, creating a
    secondary Ring-0 overflow path via malicious USB device (VID=0x0A86, PID=0x0600).
    All binaries lack ASLR, DEP/NX, and CFG. Vulnerability confirmed via static
    binary analysis; runtime validation requires physical NITGEN hardware.
  Usecase: "Elevate privileges, disable biometric authentication (DoS)"
  Privileges: "kernel"
  OperatingSystem: "Windows XP, Vista, 7, 8, 10"

