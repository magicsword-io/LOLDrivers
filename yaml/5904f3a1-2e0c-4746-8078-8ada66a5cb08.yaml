MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create Astra64 binPath=C:\windows\temp\Astra64.sys type=kernel &&
    sc.exe start Astra64
  Description: ASTRA64.sys is the kernel driver for the ASTRA32 system information
    tool by Sysinfo Lab (EnTech Taiwan). The driver exposes 31 IOCTLs with zero validation
    on all parameters including arbitrary physical memory read/write via ZwOpenSection
    and ZwMapViewOfSection on Device\PhysicalMemory with PAGE_READWRITE, arbitrary
    port I/O via HalTranslateBusAddress, arbitrary MSR read via rdmsr (enables KASLR
    bypass via IA32_LSTAR), PCI configuration space read via HalGetBusDataByOffset,
    and MMIO physical memory mapping via MmMapIoSpace. No authentication gate, no
    DACL restrictions (plain IoCreateDevice). Loads on any x64 Windows system. EnTech
    Taiwan also produces TVicPort and softEngine drivers which share similar low-level
    hardware access patterns. Listed in Eclypsium Screwed-Drivers research.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
Resources:
- https://github.com/magicsword-io/LOLDrivers/issues/294
- https://eclypsium.com/research/screwed-drivers-signed-sealed-delivered/
