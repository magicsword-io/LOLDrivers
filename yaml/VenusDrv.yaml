Category: vulnerable driver
Verified: FALSE

Commands:
  Command: >
    sc.exe create VenusSvc type= kernel start= demand
    binPath=C:\Windows\System32\drivers\VenusDrv.sys &&
    sc.exe start VenusSvc
  Description: >
    VenusDrv.sys is a kernel-mode USB driver for NITGEN HamsterMouse biometric
    fingerprint readers (FDU01/03/04/06/13), part of the NITGEN Biometric Device
    Driver package v3.12. Like NGStar.sys in the same package, the driver calls
    IoCreateDevice() without IoCreateDeviceSecure() and applies no security descriptor
    to the resulting device object. IOCTL dispatch uses FILE_ANY_ACCESS throughout,
    so any local user can open \\.\VENUS-0 and send arbitrary IOCTLs directly into
    Ring-0 code without any privilege requirement. sprintf() is imported from
    ntoskrnl.exe without bounds checking and USB descriptor fields flow into kernel
    format strings. All binaries ship without ASLR, DEP/NX, or CFG. Vulnerability
    confirmed via static binary analysis; runtime validation requires physical
    NITGEN HamsterMouse hardware.
  Usecase: "Elevate privileges"
  Privileges: "kernel"
  OperatingSystem: "Windows XP, Vista, 7, 8, 10"

