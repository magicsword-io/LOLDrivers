Category: vulnerable driver
Commands:
  Command: sc.exe create TRIXX binPath=C:\windows\temp\TRIXX.sys type=kernel && sc.exe
    start TRIXX
  Description: TRIXX.sys is a shared utility kernel driver distributed by TechPowerUp
    LLC with Sapphire TRIXX and GPU-Z. The driver provides completely unrestricted
    hardware access from usermode through 16+ IOCTLs with zero validation on hardware
    parameters, including arbitrary port I/O read/write, arbitrary PCI configuration
    space read/write via HalGetBusDataByOffset/HalSetBusDataByOffset, MMIO BAR mapping
    via MmMapIoSpace, and MMIO read/write through mapped BARs. Physical memory read/write
    is achievable by remapping a PCI device BAR to a target physical address then
    mapping it via MmMapIoSpace. The driver creates its device dynamically based on
    the Windows service name and has no hardware dependency, loading on any x64 Windows
    system. TechPowerUp has a history of vulnerable kernel drivers including GPU-Z.sys
    (CVE-2019-7245, CVE-2025-5324) and ThrottleStop.sys (CVE-2025-7771) which expose
    the same MmMapIoSpace primitive. Fresh EV code signing certificate valid until
    April 2028 with zero AV detections.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
