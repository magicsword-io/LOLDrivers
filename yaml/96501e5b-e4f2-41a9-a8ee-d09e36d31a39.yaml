MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create WinIo64 binPath=C:\windows\temp\WinIo64.sys type=kernel &&
    sc.exe start WinIo64
  Description: WinIo64.sys is a hardware access driver based on the WinIo library
    that provides direct physical memory access and I/O port operations from usermode.
    The driver maps the \Device\PhysicalMemory section object to user space via ZwOpenSection
    and ZwMapViewOfSection (IOCTL 0x80102040), with corresponding unmap (IOCTL 0x80102044),
    and provides arbitrary I/O port read (IOCTL 0x80102050) and write (IOCTL 0x80102054)
    in byte, word, and dword widths. Physical address translation via HalTranslateBusAddress
    is also available. WHQL attestation signed via Microsoft Windows Third Party Component
    CA 2014. Distributed by multiple OEM utilities and heavily abused in the wild
    with 61 malicious execution parents on VT including malware droppers and BYOVD
    tools. Used by KDU (Kernel Driver Utility) as a provider.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
