Author: Bilal Retiat
Created: '2026-04-10'
MitreID: T1562
CVE: []
Category: vulnerable driver
Verified: 'TRUE'
Commands:
  Command: sc.exe create PoisonX.sys binPath=C:\windows\temp\PoisonX.sys type=kernel
    && sc.exe start PoisonX.sys
  Description: A Microsoft-signed vulnerable driver used in BYOVD attacks to terminate
    protected processes, including EDR solutions such as CrowdStrike Falcon. The driver
    exposes an IOCTL that allows arbitrary process termination from user mode by passing
    a PID.
  Usecase: Kill EDR / Privilege Escalation
  Privileges: kernel
  OperatingSystem: Windows 11
Resources:
- https://medium.com/@jehadbudagga/reverse-engineering-a-0day-used-against-crowdstrike-edr-a5ea1fbe3fd4
- https://github.com/j3h4ck/PoisonKiller/
