Tags:
- WDTKernel.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-04-07'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create WDTKernel binPath=C:\windows\temp\WDTKernel.sys type=kernel
    && sc.exe start WDTKernel
  Description: WDTKernel.sys is a Dell Watchdog Timer Kernel Driver that exposes 12
    IOCTLs for arbitrary physical memory read/write via MmMapIoSpace with zero validation
    on user-supplied physical addresses. It also provides 12 IOCTLs for unrestricted
    I/O port access and 2 IOCTLs for PCI configuration space access. The driver was
    WHQL attestation signed through Microsoft and is distributed via the Microsoft
    Update Catalog. VMware Carbon Black TAU mentioned this driver in their October
    2023 research but classified it as not vulnerable in terms of access control because
    its INF sets an SDDL restricting device access to Administrators and SYSTEM. The
    arbitrary physical memory R/W via MmMapIoSpace was not analyzed or documented
    by TAU. Device path is \\.\__WDT__. Suitable for BYOVD attacks where the attacker
    already has admin privileges and needs kernel-level memory access to bypass EDR.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
Resources:
- https://github.com/magicsword-io/LOLDrivers/issues/290
- https://blogs.vmware.com/security/2023/10/hunting-vulnerable-kernel-drivers.html
