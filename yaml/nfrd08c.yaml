Category: vulnerable driver
Verified: FALSE

Commands:
  Command: >
    sc.exe create nfrd08cSvc type= kernel start= demand
    binPath=C:\Windows\System32\drivers\nfrd08c.sys &&
    sc.exe start nfrd08cSvc
  Description: >
    nfrd08c.sys is a kernel-mode USB driver for the NITGEN eNBioScan-C1 fingerprint
    reader (FDU08), part of the NITGEN Biometric Device Driver package v3.12. The
    driver creates its device object using IoCreateDevice() without IoCreateDeviceSecure()
    and applies no security descriptor, exposing \\.\FDU08-0 to any local user process.
    IOCTL dispatch codes use FILE_ANY_ACCESS throughout. Part of a three-driver package
    where all share the same access control vulnerability class (see also NGStar.sys and
    VenusDrv.sys). Binaries compiled November 2012 without ASLR, DEP/NX, or CFG.
    Vulnerability confirmed via static binary analysis; runtime validation requires
    physical NITGEN eNBioScan-C1 hardware.
  Usecase: "Elevate privileges"
  Privileges: "kernel"
  OperatingSystem: "Windows XP, Vista, 7, 8, 10"

