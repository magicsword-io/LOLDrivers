Category: vulnerable driver
Commands:
  Command: sc.exe create dtr_ec binPath=C:\windows\temp\dtr_ec.sys type=kernel &&
    sc.exe start dtr_ec
  Description: dtr_ec.sys is a Dell kernel driver that ships as part of the Dell
    Feature Enhancement Pack (DFEP) on Dell laptops and desktops. The driver provides
    unrestricted read/write access to Embedded Controller (EC) registers across 5 ACPI
    address spaces from usermode with no validation on the register addresses or values.
    The Embedded Controller manages critical hardware functions including thermal
    management, battery charging, fan control, power states, and keyboard input.
    Unrestricted EC register access allows manipulation of thermal thresholds to cause
    hardware damage or forced shutdowns, modification of fan speed controls, interference
    with battery charging logic, and alteration of power management behavior. Dell PSIRT
    has confirmed the vulnerability and triaged it as P2 severity on Bugcrowd.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
