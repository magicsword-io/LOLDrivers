Tags:
- Driver_win10.sys
- Filter.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-05-05'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create Driver_win10 binPath=C:\windows\temp\Driver_win10.sys type=kernel
    && sc.exe start Driver_win10
  Description: Kernel driver family observed dropped by Black Basta tooling and adjacent
    intrusions during 2025. The 55 KB sample is signed by Microsoft Windows Hardware
    Compatibility Publisher (WHQL attestation), allowing it to load on systems with
    HVCI enabled. Two additional 44 KB unsigned variants share the same imphash and
    identical/near-identical authentihashes, indicating the same driver body redistributed
    without the embedded signature blob. Imports include FltEnumerateFilters and
    FltUnregisterFilter (minifilter enumeration and unregistration), MmCopyVirtualMemory
    (cross-process kernel-assisted memory copy), ZwTerminateProcess and ZwOpenProcess
    (process termination), and KeStackAttachProcess (process attach) — primitives
    suitable for tamper protection or evasion of endpoint security minifilters.
  OperatingSystem: Windows 10
  Privileges: kernel
  Usecase: Elevate privileges
Resources:
