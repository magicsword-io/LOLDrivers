Tags:
- dpmemio.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-04-06'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create dpMemIO binPath=C:\windows\temp\dpmemio.sys type=kernel
    && sc.exe start dpMemIO
  Description: ET&T Technology Co., Ltd. dpmemio.sys (ClevoECView) is a 12KB driver
    with only 9 imports that provides completely unrestricted arbitrary physical memory
    read/write and I/O port access with no authentication, no ACL, no address validation,
    and no size validation. MmUnmapIoSpace is not even imported, meaning every MmMapIoSpace
    call permanently leaks a system PTE mapping. An additional bug exists where MOVSXD
    sign-extension on a 32-bit UserBufferPtr provides a write-to-kernel-VA primitive.
    IOCTLs exposed via \\.\dpMemIO include 0xC80A2420 (arbitrary physical memory READ
    via MmMapIoSpace), 0xC80A2424 (arbitrary physical memory WRITE via MmMapIoSpace),
    0xC80A2410/0xC80A2414 (I/O port read/write byte), 0xC80A2418/0xC80A241C (I/O
    port read/write variable size), and 0xC80A2428 (version/ping). VeriSign signed
    with a revoked certificate.
  OperatingSystem: Windows 10
  Privileges: kernel
  Usecase: Elevate privileges
Resources:
- https://github.com/magicsword-io/LOLDrivers/issues/288
