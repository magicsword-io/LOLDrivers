MitreID: T1068
Category: vulnerable driver
Verified: 'TRUE'
Commands:
  Command: sc.exe create ProcessCtr binPath=C:\windows\temp\ProcessCtr.sys type=kernel
    && sc.exe start ProcessCtr
  Description: EsafeNet ProcessCtr / ProcessCtrl64.sys creates a device object reachable
    by local callers and exposes process-control IOCTL paths. Public research documents
    a vulnerable process-termination path that can allow privileged process termination
    or denial of service when user-supplied context/handle material is accepted without
    adequate authorization checks.
  Usecase: Terminate arbitrary processes from kernel mode, including protected security
    processes, through an unauthenticated IOCTL handler.
  Privileges: kernel
  OperatingSystem: Windows 10, Windows 11
