Category: vulnerable driver
Commands:
  Command: sc.exe create ArgusMonitor binPath=C:\windows\temp\ArgusMonitor.sys type=kernel
    && sc.exe start ArgusMonitor
  Description: ArgusMonitor.sys is the kernel driver for the Argus Monitor hardware
    temperature monitoring and fan control application by Argotronic UG (Germany). The
    driver exposes 47 IOCTLs providing arbitrary physical memory read/write via MmMapIoSpace
    (32 map slots, up to 128KB) with a single-shot read primitive that bypasses the
    address restriction (busNum=0xFF), unrestricted port I/O (any port 0x0000-0xFFFF),
    PCI configuration space read/write via HalGetBusDataByOffset and HalSetBusDataByOffset,
    MSR read/write with a whitelist that blocks IA32_LSTAR but allows IA32_MISC_ENABLE
    write (can disable NX/XD system-wide), and I2C/SMBus access via MMIO bit-banging.
    The driver uses IoCreateDevice with no DACL and IRP_MJ_CREATE returns STATUS_SUCCESS
    immediately with no caller validation. A handshake IOCTL accepts a user-chosen 0x200-byte
    XOR keypad (sending all zeros effectively disables the XOR layer). WHQL attestation
    signed with an active Microsoft certificate. KASLR bypass confirmed via physical
    memory PE header scan. Loads on any x64 Windows without ArgusMonitor software.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
