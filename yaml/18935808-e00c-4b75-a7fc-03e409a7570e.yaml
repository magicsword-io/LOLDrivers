Author: Michael Haag
Created: '2026-06-16'
MitreID: T1562.001
Category: vulnerable driver
Commands:
  Command: sc.exe create EnPortv binPath=C:\windows\temp\EnPortv.sys type=kernel &&
    sc.exe start EnPortv
  Description: Guidance Software EnPortv.sys is an older EnCase kernel driver documented
    in KOSEC BYOVD research and in public reporting on signed forensic drivers used
    by EDR-killer tooling. KOSEC documents a KillProc IOCTL path that can terminate
    a target process when called from an administrator context with the expected caller
    PID material.
  Usecase: Terminate processes from kernel mode through the EnPortv KillProc IOCTL
    path.
  Privileges: kernel
  OperatingSystem: Windows 10, Windows 11
Resources:
- https://github.com/KOSEC-LLC/BYOVD-Research/tree/main/EnCase
- https://www.bleepingcomputer.com/news/security/edr-killer-tool-uses-signed-kernel-driver-from-forensic-software/
