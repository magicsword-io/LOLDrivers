Category: vulnerable driver
Commands:
  Command: sc.exe create CcProtect binPath=C:\windows\temp\CcProtect.sys type=kernel
    && sc.exe start CcProtect
  Description: CnCrypt CcProtect.sys is a signed kernel driver used by BlackSnufkin
    BYOVD research as a process-killer provider. The public PoC documents this hash
    as a vulnerable CcProtect driver and notes that HVCI must be disabled to avoid
    instability.
  Usecase: Terminate processes from kernel mode through a vulnerable CcProtect driver
    path.
  Privileges: kernel
  OperatingSystem: Windows 10, Windows 11
Resources:
- https://github.com/BlackSnufkin/BYOVD/tree/main/CcProtect-Killer
