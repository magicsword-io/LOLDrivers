Tags:
- TcIo.sys
- TcRouter.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-04-10'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create TcIo binPath=C:\windows\temp\TcIo.sys type=kernel && sc.exe
    start TcIo
  Description: TcIo.sys and TcRouter.sys are WHQL Microsoft-signed kernel drivers from
    Beckhoff Automation GmbH (TwinCAT 3 Industrial Automation Runtime). TcIo.sys exposes
    arbitrary physical memory read/write via ZwOpenSection on Device\PhysicalMemory,
    arbitrary MMIO mapping via MmMapIoSpace, PCI configuration space read/write via
    HalGetBusDataByOffset and HalSetBusDataByOffset, and full PCI BAR probing and mapping.
    TcRouter.sys exposes arbitrary port I/O via direct ring-0 in/out instructions. Both
    drivers use plain IoCreateDevice with no DACL and have no caller validation on
    IRP_MJ_CREATE. All IOCTLs use METHOD_NEITHER with FILE_ANY_ACCESS. No hardware gate
    -- drivers load on any x64 Windows without Beckhoff hardware. CVE-2018-7502 was
    assigned for an untrusted pointer dereference in IOCTL 0x222206 affecting 19 drivers
    in the TwinCAT family (CISA advisory ICSA-18-081-02, Source Incite SRC-2018-0007).
    The physical memory and port I/O primitives described here go beyond the scope of
    CVE-2018-7502. 18 related drivers share the same codebase and certificate.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
Resources:
