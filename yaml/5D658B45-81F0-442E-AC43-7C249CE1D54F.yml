Commands:
    Command:  'sc.exe create ProcessCtr.sys binPath=C:\windows\temp\ProcessCtr.sys type=kernel && sc.exe start ProcessCtr.sys'
    Description:  The driver creates a device object at \\.\ProcessCtr with no DACL restrictions, so any local user can open a handle. The IRP_MJ_DEVICE_CONTROL
    dispatcher accepts IOCTL 0x89DB202C with a 4-byte DWORD input (target PID) and chains
    ZwOpenProcess -> ZwTerminateProcess against
    the supplied PID, with no caller validation. Because the kernel-mode caller bypasses
    user-mode access checks, the primitive can terminate any process on the system
    including PPL-protected AV/EDR processes.
    Usecase: Terminate arbitrary processes from kernel mode (including PPL-protected
    AV/EDR processes) via an unauthenticated IOCTL handler.
    Privileges: kernel
    OperatingSystem: Windows 10
Resources:
    - https://github.com/The-Sword-of-Constantine/UsingBYOVD

