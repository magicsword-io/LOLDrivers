Tags:
- qu829.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-05-05'
MitreID: T1068
Category: malicious
Commands:
  Command: sc.exe create qu829 binPath=C:\windows\qu829.sys type=kernel && sc.exe
    start qu829
  Description: Kernel driver signed by "Fuqing Yuntan Network Tech Co.,Ltd." (a revoked
    VeriSign code-signing certificate that Microsoft has flagged as abused). Multiple
    samples in this family produce a Cobalt Strike beacon reflective loader YARA hit
    (Elastic protections-artifacts ruleset Windows_Trojan_CobaltStrike) and are detected
    by Microsoft as Trojan:Win32/Hitbrovi.G. Samples are dropped to C:\Windows under
    random eight-character filenames (e.g. qu829.exe) and registered as kernel services.
    Both observed variants share imphash ca73883db8881686fb258a9d289e3909.
  OperatingSystem: Windows 10
  Privileges: kernel
  Usecase: Elevate privileges
Resources:
- https://www.virustotal.com/gui/file/46f2c93c279763a818dffbf89c8893ac0718bd3f5d8fbf327887063068a412a5
