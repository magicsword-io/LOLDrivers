Tags:
- DsArk64.sys
- DsArk.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-04-13'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create DsArk binPath=C:\windows\temp\DsArk64.sys type=kernel &&
    sc.exe start DsArk
  Description: DsArk64.sys is a WHQL Microsoft-signed anti-rootkit kernel driver from
    Qihoo 360 Total Security. It exposes kernel-level process termination via
    ZwTerminateProcess from Ring 0 (kills PPL-protected processes), arbitrary kernel
    memory read (512 bytes), and arbitrary kernel memory write (32 bytes). The driver
    gates device access behind a custom Authenticode signing check that validates the
    calling process PE signature against Qihoo root certificates. This check is fully
    bypassed via process hollowing into any Qihoo-signed executable (freely downloadable
    from 360.cn). The process kill IOCTL (0x80863008) requires no encryption or additional
    auth beyond the device open -- just a raw 4-byte PID. The kernel R/W IOCTLs use
    AES-128-CBC with a static key embedded in the binary. Initialization requires
    setting registry key HKLM\SYSTEM\CCS\Services\360FsFlt\daboot to 1.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
Resources:
- https://github.com/magicsword-io/LOLDrivers/issues/308
Detection: []
