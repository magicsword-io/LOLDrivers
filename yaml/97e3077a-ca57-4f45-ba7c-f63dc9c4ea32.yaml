Category: vulnerable driver
Commands:
  Command: sc.exe create CardIo binPath=C:\windows\temp\CardIo64.sys type=kernel &&
    sc.exe start CardIo
  Description: CardIo64.sys is a kernel driver from ICP DAS Co., LTD. (Taiwan), an
    industrial automation and I/O board manufacturer. The driver exposes arbitrary
    physical memory read/write via MmMapIoSpace, port I/O read/write (8/16/32-bit),
    and PCI bus data read/write via HalGetBusDataByOffset and HalSetBusDataByOffset.
    The driver is only 13KB and is also available in the KeServiceDescriptorTable/vulnerable-drivers
    repository on GitHub.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
