Category: vulnerable driver
Verified: 'TRUE'
Commands:
  Command: sc.exe create bsitf binPath=C:\windows\temp\bsitf.sys type=kernel && sc.exe
    start bsitf
  Description: ASUS BIOS Flash Driver (bsitf.sys) persists on disk after WinFlash
    BIOS update completes. The driver exposes physical memory read via MmMapIoSpace
    (IOCTL 0x222804), physically contiguous kernel memory allocation mapped to user
    mode via MDL (IOCTL 0x222808), arbitrary I/O port read/write (IOCTLs 0x222810,
    0x222818), and BIOS flash write via MmMapIoSpace (IOCTL 0x22281c). Device SDDL
    grants full access to Administrators group without additional authentication.
  Usecase: Kernel memory access, physical memory read, BIOS flash write, EDR bypass
  Privileges: Administrator
  OperatingSystem: Windows 10, Windows 11
