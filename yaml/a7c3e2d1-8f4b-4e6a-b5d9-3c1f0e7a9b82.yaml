Tags:
- CorMem.sys
Verified: 'TRUE'
Author: Michael Haag
Created: '2026-04-06'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create CorMem.sys binPath=C:\windows\temp\CorMem.sys type=kernel
    && sc.exe start CorMem.sys
  Description: Teledyne Digital Imaging CorMem.sys (Sapera Memory Manager) exposes
    physical memory read/write, contiguous memory allocation, and I/O port access to
    user-mode processes via CorMem.dll wrapper functions. The driver provides 36 exported
    functions including CorMemGetPhysMemory, CorMemMapPhysMemory, CorMemAllocPhysMemory,
    CorMemReadIo, and CorMemWriteIo. Actively abused for BYOVD with 0/71 VT detection.
    Execution parents include Cobalt Strike/IcedID malware and game cheat kernel loaders.
  OperatingSystem: Windows 10
  Privileges: kernel
  Usecase: Elevate privileges
