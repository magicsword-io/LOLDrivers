Category: vulnerable driver
Commands:
  Command: sc.exe create AppShopDrv103 binPath=C:\windows\temp\AppShopDrv103.sys type=kernel
    && sc.exe start AppShopDrv103
  Description: AppShopDrv103.sys is a hardware utility driver from ASRock distributed
    with APP Shop and Auto Driver Installer. The driver exposes 30+ IOCTLs through
    a BCrypt AES-encrypted command wrapper (IOCTL 0x22EC00) with a hardcoded key,
    providing arbitrary physical memory read and write via MmMapIoSpace (IOCTLs 0x22E808/0x22E80C),
    unrestricted I/O port read and write in byte, word, and dword widths (IOCTLs 0x22E810-0x22E824),
    full PCI configuration space read and write via port 0xCF8/0xCFC (IOCTLs 0x22E830-0x22E844),
    MSR read and write via rdmsr/wrmsr (IOCTLs 0x22E848/0x22E84C), control register
    reads for CR0/CR2/CR3/CR4/CR8 (IOCTL 0x22E86C), RDTSC and RDPMC performance counter
    access, CPUID execution, and contiguous memory allocation. Same vulnerability
    class as other ASRock drivers (AsrDrv.sys) already tracked in LOLDrivers. Used
    by KDU (Kernel Driver Utility) as a provider.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
