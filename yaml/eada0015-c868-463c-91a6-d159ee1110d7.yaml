Commands:
  Command: sc.exe create KRegExp binPath=C:\windows\temp\KRegExp.sys type=kernel &&
    sc.exe start KRegExp
  Description: KRegExp.sys is Pavel Yosifovich's Kernel Registry Explorer driver and
    is listed as a KDU-compatible provider. KDU uses provider drivers to perform privileged
    kernel operations including kernel memory access and process-object manipulation.
  Usecase: Access kernel primitives through a KDU-supported provider driver.
  Privileges: kernel
  OperatingSystem: Windows 10, Windows 11
