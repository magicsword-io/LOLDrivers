Author: Michael Haag
Created: '2026-04-13'
MitreID: T1068
Category: vulnerable driver
Commands:
  Command: sc.exe create KDHacker binPath=C:\windows\temp\kdhacker64_ev.sys type=kernel
    && sc.exe start KDHacker
  Description: kdhacker64_ev.sys is a kernel driver from Beijing Kingsoft Security
    software bundled with Kingsoft AntiVirus and Liebao Browser. The driver exposes a
    kernel heap buffer overflow via IOCTL 0x120140 with approximately 512 bytes of
    overflow into adjacent kernel pool allocations. The root cause is a size validation
    mismatch -- input is validated at 0x488 bytes per element but only 0x248 bytes are
    allocated per element. RtlInitUnicodeString is called on user-controlled buffers
    without null terminator bounds checking, producing oversized ANSI strings that
    overflow 64-byte destination buffers. No authentication is required to access the
    device. The driver also includes TDI hooks for TCP/UDP/RawIP interception, process
    creation notification callbacks, filesystem filter attachments to NTFS/FAT/CDFS,
    camera device monitoring, and HTTP header parsing. Other Kingsoft drivers (ksapi.sys,
    mydrivers.sys) are already tracked in LOLDrivers.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
Resources:
- https://github.com/magicsword-io/LOLDrivers/issues/309
