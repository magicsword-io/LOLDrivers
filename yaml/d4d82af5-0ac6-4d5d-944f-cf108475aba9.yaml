MitreID: T1562.001
CVE: []
Category: vulnerable driver
Commands:
  Command: sc.exe create 360hvm64 binPath=C:\windows\temp\360hvm64.sys type=kernel
    && sc.exe start 360hvm64
  Description: 360hvm64.sys is the kernel-mode hypervisor enforcement driver shipped
    with Qihoo 360 Total Security. DriverEntry creates the device \Device\360Hvm
    with its symbolic link \DosDevices\360Hvm (user-accessible as \\.\360Hvm) without
    using IoCreateDeviceSecure or applying an explicit SDDL, so the device inherits
    the Object Manager default and is reachable by any Administrator-level caller.
    The IRP_MJ_DEVICE_CONTROL handler (sub_123f0) services a small set of IOCTLs;
    IOCTL 0x22240c (METHOD_BUFFERED, DeviceType=0x22, Function=0x903) calls sub_136cc
    which (1) acquires a FastMutex (data_77608), (2) sets data_b4ebc |= 0x10000 to
    flag a shutdown in progress, (3) issues a per-CPU DPC broadcast (sub_13294 with
    sub_1355c) that clears the active-VT flag and calls the HVM exit handler at
    *(data_106948+0x20) on every logical processor to execute VMXOFF/VMSKINIT,
    (4) clears the active-HVM flag, and (5) invokes the state-change callback at
    data_6d2b8(0). The result is that 360's hardware-virtualization-based protection
    engine is disabled across all CPUs. The driver attempts to gate user-mode IOCTLs
    via sub_121f4, which delegates the access decision to \Device\360SelfProtection
    using IoBuildDeviceIoControlRequest; when that companion device is absent (the
    BYOVD scenario where 360hvm64.sys is loaded standalone from outside the 360
    suite) the gate returns 1 (PERMITTED), so the auth check fails open. Other IOCTLs
    on the device read sensitive MSRs (0x22240c reads IA32_FEATURE_CONTROL [0x3A]
    and AMD VM_CR [0xC0010114] to fingerprint CPU virtualization capability) and
    expose state-query / configuration entry points. The full IOCTL family
    inventoried by both teams (CyberDagger initial pass + Titan Code Solutions
    cross-validation via Driver Workbench export) is 0x222400, 0x222404, 0x222408,
    0x22240c (RVA 0x136cc — primary BYOVD primitive), 0x222410, 0x222414, 0x222418
    (RVA 0x12aa8 — surfaced by Titan Code Solutions), 0x22241c, 0x222420 (RVA 0x4086c
    — surfaced by Titan Code Solutions), 0x222424. All BUFFERED, all CRITICAL when
    the auth gate fails open. Loaded standalone, the driver is a primitive for
    disabling 360's VM-based monitoring before subsequent rootkit or unsigned-driver
    loads.
  Usecase: Disable 360 Total Security's VT-x/AMD-V hypervisor-based protection engine
    on all CPUs to enable subsequent loading of rootkits or unsigned drivers without
    VM-level detection
  Privileges: kernel
  OperatingSystem: Windows 7, Windows 8, Windows 10, Windows 11
