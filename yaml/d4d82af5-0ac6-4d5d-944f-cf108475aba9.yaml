MitreID: T1562.001
CVE: []
Category: vulnerable driver
Commands:
  Command: sc.exe create 360hvm64 binPath=C:\windows\temp\360hvm64.sys type=kernel
    && sc.exe start 360hvm64
  Description: 360hvm64.sys is the kernel-mode hypervisor enforcement driver
    shipped with Qihoo 360 Total Security. IOCTL 0x22240c on \\.\360Hvm issues
    a per-CPU DPC broadcast that executes VMXOFF/VMSKINIT on every logical
    processor, disabling VT-x/AMD-V hypervisor protection across all CPUs;
    the auth gate (sub_121f4) delegates to \Device\360SelfProtection and fails
    open when that companion device is absent (BYOVD scenario).
  Usecase: Disable 360 Total Security's VT-x/AMD-V hypervisor-based protection engine
    on all CPUs to enable subsequent loading of rootkits or unsigned drivers without
    VM-level detection
  Privileges: kernel
  OperatingSystem: Windows 7, Windows 8, Windows 10, Windows 11
