Detection:
- type: yara
  value: |
    rule loldrivers_360hvm64
    {
        meta:
            author      = "@cyb3rh0und + @reiterjr"
            description = "Qihoo 360 hypervisor enforcement driver (360hvm64.sys) - IOCTL 0x22240c disables VT-x/AMD-V on all CPUs; auth fails open in BYOVD"
            MitreID     = "T1562.001"
            SHA256      = "f89d5d95b8a59e6d5e50a49217f83d080e4eaf4bb77b80d8f38cd915640ba124"
        strings:
            $dev1  = "\\Device\\360Hvm" wide
            $dev2  = "\\DosDevices\\360Hvm" wide
            $dev3  = "\\Device\\360SelfProtection" wide
            $dat   = "360HVM64.DAT" wide
            $ioctl = { 0c 24 22 00 }
        condition:
            uint16(0) == 0x5A4D and (all of ($dev*) or ($ioctl and $dat))
    }
- type: sigma
  value: |
    title: Qihoo 360 HVM Driver Loaded Standalone (BYOVD - Hypervisor Killer)
    id: d4d82af5-0ac6-4d5d-944f-cf108475aba9
    status: experimental
    description: Detects on-disk presence or load of 360hvm64.sys outside the full
        Qihoo 360 Total Security installation (BYOVD scenario where the auth gate
        in sub_121f4 fails open and IOCTL 0x22240c can be issued to disable VT-x/AMD-V
        on all CPUs).
    author: '@cyb3rh0und + @reiterjr'
    date: 2026/04/30
    logsource:
        category: driver_load
        product: windows
    detection:
        selection:
            Hashes|contains:
                - 'SHA256=f89d5d95b8a59e6d5e50a49217f83d080e4eaf4bb77b80d8f38cd915640ba124'
                - 'MD5=0b5c4cd701956b332e60ae85b8c3a7ea'
                - 'SHA1=97cbe12e2538aa8a382485e6a00be9337ed72b85'
        condition: selection
    falsepositives:
        - Legitimate Qihoo 360 Total Security installation (full suite present, with
          \Device\360SelfProtection registered)
    level: medium
    tags:
        - attack.defense_evasion
        - attack.t1562.001
