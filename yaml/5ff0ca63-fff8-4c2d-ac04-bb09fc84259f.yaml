Commands:
  Command: sc.exe create nipalk binPath=C:\windows\temp\nipalk.sys type=kernel &&
    sc.exe start nipalk
  Description: nipalk.sys is the NI-PAL (Platform Abstraction Layer) core kernel driver
    that ships with every National Instruments product including NI-DAQmx, LabVIEW,
    and NI-VISA. The driver uses a single IOCTL gateway (0xABCD03C4) dispatching to
    a two-level service table. The device is created with IoCreateDevice (no DACL) and
    IRP_MJ_CREATE returns STATUS_SUCCESS unconditionally with zero caller validation.
    Exposes arbitrary physical memory read/write to usermode via ZwOpenSection on
    Device\PhysicalMemory with SECTION_ALL_ACCESS and ZwMapViewOfSection with
    PAGE_READWRITE, kernel pages mapped to usermode via MmBuildMdlForNonPagedPool and
    MmMapLockedPagesSpecifyCache, VA-to-PA translation via MmGetPhysicalAddress,
    contiguous DMA allocation via MmAllocateContiguousMemorySpecifyCache, full bus
    read/write, and PCI configuration space access. CVE-2021-38304 covers a different
    vulnerability class (improper input validation in versions prior to 20.0.1f0) but
    the physical memory mapping primitives documented here go beyond that CVE scope.
    EV code signing certificate valid until July 2027.
  Usecase: Elevate privileges
  Privileges: kernel
  OperatingSystem: Windows 10
Resources:
